<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Flag Project</title>
    <style>
      /* Write your CSS Code here */

      .flag {
        background-color: red;
        height: 200px;
        width: 300px;
        position: relative;
      }

      p {
        font-size: 30px;
        text-align: center;
        margin: 0;
      }

      .flag > p {
        color: white;
      }

      div.flag > div {
        background-color: blue;
        height: 50%;
        width: 100%;
        top: 25%;
        position: absolute;
      }

      .flag > div > div {
        background-color: white;
        height: 75%;
        width: 25%;
        border-radius: 50%;
        position: relative;
        top: 15%;
        left: 40%;
      }
    </style>
  </head>

  <!-- 
  IMPORTANT! Do not change any HTML
Don't add any classes/ids/elements 
Use what you know about combining selectors

Hint 1: The flag is 900px by 600px and the circle is 200px by 200px.

-->

  <body>
    <div class="flag">
      <p>The Flag</p>
      <div>
        <div>
          <p>of Laos</p>
        </div>
      </div>
    </div>
  </body>
</html>
