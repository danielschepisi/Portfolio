<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CSS Properties</title>
    <style>
      body {
        background-color: cornflowerblue;
        color: white;
        font-size: 18px;
      }

      /* Don't change the CSS above, add Your CSS below */
      .color {
        color: coral;
      }

      #second {
        font-size: 2rem;
      }

      .heavy {
        font-size: 900;
      }

      .font-fam {
        font-family: cursive;
      }

      .move-right {
        text-align: right;
      }

      html {
        font-size: 30px;
      }
    </style>
  </head>

  <body>
    <h1>Important CSS Properties</h1>
    <p class="color">Color</p>
    <p id="second">Font Size</p>
    <p class="heavy">Font Weight</p>
    <p class="font-fam">Font Family</p>
    <p class="move-right">Text Align</p>
  </body>
</html>
